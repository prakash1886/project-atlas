# Hermes DS-STAR Configuration — Cost Optimized Settings
# Configured for Project Atlas Railway/Hostinger Deployment

api:
  port: 8000
  host: "0.0.0.0"
  # No default here on purpose — set DSSTAR_API_KEY as a Railway env var.
  # app.py disables auth entirely if both are unset, so deploys without a
  # real key set are intentionally locked out rather than silently exposed.
  secret_key: ""

ds_star:
  data_directory: "../ds-star/data"
  max_refinement_rounds: 3
  # Bare model ids, no provider prefix -- AIAgent calls Google's API directly
  # (base_url=generativelanguage.googleapis.com), so a LiteLLM-style "gemini/"
  # prefix 404s ("models/gemini/gemini-1.5-flash is not found"). gemini-2.5-flash
  # is the id already verified working elsewhere in this repo (LiteLLM gateway,
  # gemini-direct provider) with the same GEMINI_API_KEY.
  # NOTE: only "analyzer" is actually read by app.py's execute_self_improving_hermes_agent;
  # the other four keys are unused by current code, kept here for when per-role
  # model selection gets wired up.
  agent_models:
    router: "gemini-2.5-flash-lite"
    researcher: "gemini-2.5-flash"
    analyzer: "gemini-2.5-flash"
    verifier: "gemini-2.5-flash-lite"
    finalizer: "gemini-2.5-flash"

modal:
  # Production host for the Script agent (Gemma 4 26B-A4B MoE, spec §11.1).
  # Served by Gemma4InferenceEngine.generate_script in server/src/modules/llm/modal/app.py,
  # reachable at <openai_proxy base URL>/v1/script (current deploy:
  # https://prakash1886--cost-effective-gemma4-pipeline-gemma4infere-5c4b8b.modal.run/v1/script).
  # Left blank by default; set via MODAL_SCRIPT_ENDPOINT_URL env var instead of committing the
  # live URL here. Falls back to the local self-improving deepseek/gemini loop when unset.
  endpoint_url: ""
  timeout_seconds: 60

production_agents:
  # The 11 video-production execution agents (soul-reference, visual-generation,
  # presenter-generation, narration-synthesis, music-generation, asset-sourcing,
  # thumbnail-generation, video-assembly, captioning, render-qc, video-publish) are
  # deterministic API callers, not LLM judgment loops — they read secrets straight
  # from env vars (see each hermes/integrations/*_client.py for the exact name),
  # nothing is configured here. Listed for visibility only:
  #   HIGGSFIELD_KEY_ID / HIGGSFIELD_KEY_SECRET       - higgsfield_client.py
  #   GOOGLE_VEO_PROJECT_ID / GOOGLE_VEO_ACCESS_TOKEN  - veo_client.py
  #   GOOGLE_LYRIA_PROJECT_ID / GOOGLE_LYRIA_ACCESS_TOKEN - lyria_client.py
  #   HEYGEN_API_KEY                                   - heygen_client.py
  #   ELEVENLABS_API_KEY                               - elevenlabs_client.py
  #   ENVATO_API_TOKEN                                 - envato_client.py
  #   YOUTUBE_ACCESS_TOKEN                              - youtube_client.py
  #   REMOTION_AWS_REGION / REMOTION_LAMBDA_FUNCTION_NAME / REMOTION_SERVE_URL
  #     - remotion_client.py (outputs of `npx remotion lambda functions deploy` +
  #       `npx remotion lambda sites create`); AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY
  #       are read automatically by the AWS SDK inside the Node helper, not by Python.
  #   ASSET_UPLOAD_S3_BUCKET / ASSET_UPLOAD_AWS_REGION - storage_client.py (separate
  #     from Remotion's own render-output bucket; this is where narration-synthesis/
  #     music-generation/asset-sourcing upload local bytes so Remotion Lambda has a
  #     URL to fetch them from — Lambda cannot read the Railway filesystem).
  # narration-synthesis/music-generation/render-qc require the `ffprobe` binary on
  # PATH (not a pip dependency — add via the Railway build image, nixpacks.toml or an
  # apt buildpack). video-assembly requires Node.js + `npm install` run inside
  # hermes/integrations/remotion/ at deploy time (its @remotion/lambda dependency is
  # intentionally kept out of requirements.txt — it's a Node package, not a Python one).
  #
  # POST /v1/orchestrate/content-run (orchestrator.py) sequences all 11 of these for
  # one full content run — soul-reference -> parallel fan-out -> captioning ->
  # video-assembly -> render-qc -> video-publish. It persists the consolidated result
  # to hermes/data/content_runs/<run_id>.json, NOT Postgres/Apache AGE as spec §2.3
  # calls for — Hermes has no DB driver in requirements.txt yet. Migrating this once
  # a DB connection exists is a known follow-up, not done here.
  enabled: true
