# Template config for the hermes-gateway Railway service. Copied to
# $HERMES_HOME/config.yaml by entrypoint.sh on first boot only -- never
# overwritten on redeploy, since the OAuth token cache for any mcp_servers
# entry below lives alongside this file once `hermes mcp login <name>` has
# been run.
#
# The gateway runs its own inference call per request (separate from
# hermes-dsstar's embedded AIAgent) -- /v1/chat/completions errored with
# "No inference provider configured" until this was set. Needs a matching
# GEMINI_API_KEY env var on this service (reuses hermes-dsstar's key).
model: "google/gemini-2.5-flash"
#
# host/port/key for the api_server platform come from env vars
# (API_SERVER_HOST/API_SERVER_PORT/API_SERVER_KEY), set on the Railway
# service directly -- not duplicated here. This file only needs to declare
# that the platform is enabled.
platforms:
  api_server: {}

# Register MCP servers here. NexLev's MCP endpoint, per
# dashboard.nexlev.io/docs/mcp/quickstart -- requires the one-time headless
# OAuth handshake (`hermes mcp login nexlev`) to be run manually against this
# deployed service (e.g. via `railway shell`) before it's usable; this file
# alone does not complete authentication.
mcp_servers:
  nexlev:
    url: "https://prod.dashboard.nexlev.io/api/claude-mcp"
    auth: oauth
  # vidIQ's official MCP server (vidiq.com/mcp) -- keyword research, competitor
  # analysis, channel/video analytics. Read-only, requires a vidIQ "max" plan.
  # API-key auth on an HTTP MCP server goes via `headers`, not `auth:` (that's
  # for oauth, as used by nexlev above) -- VIDIQ_API_KEY is already set on this
  # Railway service and gets interpolated into the header at connect time.
  vidiq:
    url: "https://mcp.vidiq.com/mcp"
    headers:
      Authorization: "Bearer ${VIDIQ_API_KEY}"

# This deployment's startup log warned: "API server is network-accessible
# (0.0.0.0) AND the terminal backend is 'local' (unsandboxed). Agent work
# dispatched through this endpoint runs as the host user with full
# terminal/file access." We only need this agent to answer content-opportunity
# research queries and call the nexlev MCP tools -- not run shell commands or
# touch the filesystem -- so disable the toolsets that would let an
# API_SERVER_KEY leak turn into host code execution.
agent:
  disabled_toolsets:
    - terminal
    - file
    - computer_use
    - browser
    - cronjob
    # "terminal" is the OS-shell toolset; code_execution (execute_code) is a
    # SEPARATE toolset that runs arbitrary Python and can spawn subprocesses
    # -- not covered by disabling "terminal". It surfaced when the model
    # tried to follow content-opportunity's "write a Python script" framing
    # literally, then failed because execute_code requires a one-shot
    # interactive approval that can't be granted headlessly. Disabling it
    # forces the model to use its real tools (the nexlev MCP toolset) instead.
    - code_execution
    # No legitimate use for sub-agent spawning in this single-purpose
    # research gateway; keep the tool surface minimal.
    - delegation
