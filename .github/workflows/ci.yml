name: CI Pipeline

on:
  push:
    branches:
      - main
      - developer
  pull_request:
    branches:
      - main
      - developer

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for Dependency Changes
        uses: dorny/paths-filter@v3.0.3
        id: changes
        with:
          filters: |
            dependencies:
              - 'package.json'
              - 'package-lock.json'

      - name: Snyk Dependency Check
        if: steps.changes.outputs.dependencies == 'true'
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Run Linting
        run: npm run lint

      - name: Build Project
        run: npm run build
